- name: Config bash with git prompt
  hosts: all
  ignore_unreachable: true
  gather_facts: true
  become: true
  become_user: "{{ vault_user }}"

  tasks:
    - name: Show ansible variables
      ansible.builtin.debug:
        var: ansible_facts['distribution']

    - name: Ensure git prompt is in place
      ansible.builtin.copy:
        src: gitps1.sh
        dest: "/home/{{ vault_user }}/.gitps1.sh"
        owner: "{{ vault_user }}"
        group: "{{ vault_user }}"
        mode: '0644'

    - name: Ensure git prompt in shell
      when: ansible_facts['os_family'] == "RedHat"
      ansible.builtin.lineinfile:
        path: "/home/{{ vault_user }}/.bashrc"
        line: 'source ~/.gitps1.sh'
        state: present
        create: true


