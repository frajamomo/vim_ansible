---
# Initial bootstrap playbook for the tsunami server (192.168.2.14).
# First run uses password auth to deploy SSH keys and configure the server.
#
# Usage:
#   ansible-playbook tsunami-server-setup.yml --limit tsunami --vault-password-file ~/.ansible-vault.txt
#
# After first run, SSH key auth will work and the password vars can be removed.

- name: Bootstrap tsunami server with passwordless SSH from LAN
  hosts: tsunami
  gather_facts: false
  vars:
    ansible_ssh_pass: "{{ vault_tsunami_password }}"
    ansible_become_pass: "{{ vault_tsunami_password }}"
    ansible_ssh_private_key_file: ""
    local_network: "192.168.2.0/24"
    target_user: "{{ vault_user }}"

  tasks:
    - name: Gather facts
      ansible.builtin.setup:

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ target_user }}/.ssh"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0700'

    - name: Deploy SSH public key for passwordless access
      ansible.builtin.authorized_key:
        user: "{{ target_user }}"
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
        state: present

    - name: Ensure sshd allows PubkeyAuthentication
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
        state: present
      notify: restart sshd

    - name: Ensure AuthorizedKeysFile is configured
      become: true
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AuthorizedKeysFile'
        line: 'AuthorizedKeysFile .ssh/authorized_keys'
        state: present
      notify: restart sshd

    - name: Allow key-based SSH from local network
      become: true
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# {mark} ANSIBLE MANAGED - LAN access"
        block: |
          Match Address {{ local_network }}
              PubkeyAuthentication yes
      notify: restart sshd

    - name: Disable suspend and sleep targets
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

    - name: Ensure {{ target_user }} has passwordless sudo
      become: true
      ansible.builtin.copy:
        content: "{{ target_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ target_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

  handlers:
    - name: restart sshd
      become: true
      ansible.builtin.systemd:
        name: sshd
        state: restarted

- name: Verify passwordless SSH access works
  hosts: tsunami
  gather_facts: false

  tasks:
    - name: Test SSH key-based connection
      ansible.builtin.ping:

    - name: Show success message
      ansible.builtin.debug:
        msg: >-
          Passwordless SSH access to tsunami server (192.168.2.14)
          as {{ vault_user }} is working.
