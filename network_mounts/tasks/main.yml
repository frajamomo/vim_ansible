---
- name: Ensure cifs-utils is installed
  ansible.builtin.dnf:
    name: cifs-utils
    state: present

- name: Deploy Synology credentials file
  ansible.builtin.copy:
    content: |
      username={{ synology_user }}
      password={{ synology_password }}
    dest: "{{ synology_credentials_file }}"
    owner: "{{ synology_user }}"
    group: "{{ synology_user }}"
    mode: "0600"
  no_log: true

- name: Create mount point directories
  ansible.builtin.file:
    path: "/mnt/synology_{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ synology_shares }}"

- name: Mount Synology shares via CIFS
  ansible.posix.mount:
    src: "//{{ synology_host }}/{{ item }}"
    path: "/mnt/synology_{{ item }}"
    fstype: cifs
    opts: "{{ synology_mount_opts }}"
    state: mounted
  loop: "{{ synology_shares }}"
